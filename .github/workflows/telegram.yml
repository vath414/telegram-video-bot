name: Batch Download and Send

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp with impersonation
        run: |
          python -m pip install --upgrade pip
          pip install "yt-dlp[default,curl-cffi]" requests
          python -m yt_dlp --version
      - name: Check yt-dlp version
        run: yt-dlp --version
      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
