name: Telgram-Video-Bot

on:
  schedule:
    - cron: "0 */2 * * *" # Runs every 2 hours (12 times a day)
  workflow_dispatch: # Allows manual triggering

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "yt-dlp[default,curl-cffi]" requests curl-cffi
          yt-dlp --version

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add history.json || true
          git commit -m "Update download history [skip ci]" || true
          git push || true
